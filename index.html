<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>

    <section class="oil-section">

    <div class="oil-container">

        <!-- Hot Seller -->
        <div class="hot-badge" data-aos="zoom-in" data-aos-delay="100">
            <img src="images/Hot seller icon.png" alt="Hot Seller">
        </div>

        <!-- Title -->
        <div class="oil-title" data-aos="fade-up" data-aos-delay="200">
            <img src="images/Pure oil.png" alt="Inana Premium Rice">
        </div>

        <!-- Description -->
        <div class="oil-desc" data-aos="fade-up" data-aos-delay="300">
            <img src="images/Rich text2.png" alt="Rice description">
        </div>

        <!-- Product Image -->
        <div class="oil-image" data-aos="zoom-in-up" data-aos-delay="400">
            <img src="images/Pure oil image.png" alt="Rice product">
        </div>

        <!-- Bottom -->
        <div class="oil-bottom" data-aos="fade-up" data-aos-delay="500">

            <div class="price-tag">
                <img src="images/Starting text.png" alt="Starting from 1900">
            </div>

            <a href="#" class="buy-button" data-aos="pulse" data-aos-delay="600">
                <img src="images/Buy now icon.png" alt="Buy Now">
            </a>

        </div>

    </div>

</section>




    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 900,
            once: true,
            offset: 120,
            easing: "ease-out-cubic"
        });
    </script>

</body>

</html>
